<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; background: radial-gradient(1200px 800px at 20% 0%, #17172e, #0b0b12 60%); color: #e4e4e7; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 72px 84px; display: flex; flex-direction: column; }
  h1 { font-size: 96px; font-weight: 700; letter-spacing: -2px; color: #fafafa; }
  h1 .dot { color: #818cf8; }
  .tag { font-size: 30px; color: #a1a1aa; margin-top: 10px; }
  .pillars { display: flex; gap: 18px; margin-top: 56px; }
  .pill { border: 1px solid #312e81; background: #14142080; border-radius: 14px; padding: 18px 22px; font-size: 22px; color: #c7d2fe; }
  .pill b { display: block; color: #fafafa; font-size: 24px; margin-bottom: 4px; }
  .foot { margin-top: auto; display: flex; align-items: center; gap: 16px; font-size: 22px; color: #71717a; }
  .qwen { border: 1px solid #164e63; color: #67e8f9; border-radius: 999px; padding: 8px 20px; font-size: 22px; }
</style>
</head>
<body>
  <h1>engram<span class="dot">.</span></h1>
  <div class="tag">a memory engine for AI agents</div>
  <div class="pillars">
    <div class="pill"><b>Recall</b>under a hard token budget</div>
    <div class="pill"><b>Forget</b>on an Ebbinghaus curve</div>
    <div class="pill"><b>Adjudicate</b>contradictions, with audit</div>
  </div>
  <div class="foot">
    <span class="qwen">qwen3.7-plus + text-embedding-v4 on Qwen Cloud</span>
    <span>github.com/OrionArchitekton/engram</span>
  </div>
</body>
</html>
